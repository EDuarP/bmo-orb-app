<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMO Orb</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="hud">
      <div class="brand">BMO</div>

    <canvas id="orb"></canvas>

    <div class="center-copy">
      <p class="eyebrow">Voice Interface Prototype</p>
      <h1>Ey BMO</h1>
      <p>Full-screen visual orb reacting to microphone energy. Wake word pipeline comes next.</p>
    </div>

    <script src="app.js"></script>
  </body>
</html>

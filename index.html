<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMO Orb</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="hud">
      <div class="brand"></div>
      <div class="status-group">
        <span id="mic-status">Mic: waiting</span>
        <span id="wake-status">Wake word: idle</span>
        <span id="heard-status">Heard: --</span>
        <span id="level-status">Level: --</span>
        <span>Exit: Alt+F4 or F11</span>
      </div>
    </div>

    <canvas id="orb"></canvas>

    <div class="center-copy">
      <p class="eyebrow">Voice Interface</p>
      <h1></h1>
      <p></p>
    </div>

    <div class="debug-panel">
      <div class="debug-title">Live transcription debug</div>
      <div id="transcript-log" class="debug-log">Waiting for speech recognition...</div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
